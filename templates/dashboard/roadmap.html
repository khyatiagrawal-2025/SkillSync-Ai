<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  

<div class="relative">
        <!-- Avatar Trigger -->
        <div onclick="toggleDropdown()" 
            class="flex items-center gap-2.5 px-3 py-1.5 rounded-lg cursor-pointer hover:bg-gray-800/60 transition"
            style="border:1px solid rgba(255,255,255,.08)">
          
          <div class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold text-white"
              style="background:linear-gradient(135deg,#6d28d9,#ec4899)">
            {{ request.user.first_name|slice:":1"|upper }}
          </div>

          <span class="text-sm font-medium text-gray-300">
            {{ request.user.first_name }} {{ request.user.last_name }}
          </span>

          <svg class="w-3 h-3 text-gray-500 transition-transform duration-200" id="arrowIcon"
              fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
          </svg>
        </div>

        <!-- DROPDOWN -->
        <div id="userDropdown"
            class="absolute right-0 mt-2 w-56 bg-[#0f172a] border border-gray-800 rounded-xl shadow-xl hidden z-50">

          <!-- User Info -->
          <div class="px-4 py-3 border-b border-gray-800">
            <p class="text-sm font-semibold text-white">
              {{ request.user.get_full_name|default:request.user.username }}
            </p>
            <p class="text-xs text-gray-400">{{ request.user.email }}</p>
          </div>

          <!-- Menu -->
          <div class="py-1 text-sm">

            <a href="{% url 'profile' %}" class="flex items-center gap-2 px-4 py-2 text-gray-300 hover:bg-gray-800 transition">
              👤 Profile
            </a>

            <a href="#" class="flex items-center gap-2 px-4 py-2 text-gray-300 hover:bg-gray-800 transition">
              ⚙️ Settings
            </a>

            <a href="#" class="flex items-center gap-2 px-4 py-2 text-gray-300 hover:bg-gray-800 transition">
              📊 Dashboard
            </a>

          </div>

          <!-- Divider -->
          <div class="border-t border-gray-800"></div>

          <!-- Logout -->
          <div class="py-1">
            <form method="POST" action="{% url 'logout' %}">
              {% csrf_token %}
              <button type="submit" class="flex items-center gap-2 px-4 py-2 text-red-400 hover:bg-red-500/10 transition">🚪 Logout</button>
            </form>
          </div>
        </div>
      </div>


</body>
<script>
  function toggleDropdown() {
    const dropdown = document.getElementById('userDropdown');
    const arrowIcon = document.getElementById('arrowIcon');
    dropdown.classList.toggle('hidden');
    arrowIcon.classList.toggle('rotate-180');
  }

  // Close dropdown when clicking outside
  document.addEventListener('click', function(event) {
    const dropdown = document.getElementById('userDropdown');
    const trigger = event.target.closest('[onclick="toggleDropdown()"]');
    if (!trigger && !dropdown.contains(event.target)) {
      dropdown.classList.add('hidden');
      document.getElementById('arrowIcon').classList.remove('rotate-180');
    }
  });
</script>
</html>
