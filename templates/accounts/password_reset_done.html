{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check Your Email — SkillSync AI</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800;900&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Plus Jakarta Sans',sans-serif;
  background:#060610;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  width:100%;
  max-width:420px;
  background:rgba(255,255,255,.05);
  padding:40px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 30px 80px rgba(0,0,0,.6);
}

.logo{
  font-family:'Syne',sans-serif;
  font-weight:900;
  font-size:1.2rem;
  margin-bottom:10px;
  background:linear-gradient(135deg,#67e8f9,#a78bfa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.icon{
  font-size:3rem;
  margin-bottom:15px;
}

h1{
  font-family:'Syne',sans-serif;
  font-size:1.5rem;
  margin-bottom:10px;
}

p{
  color:#aaa;
  font-size:.9rem;
  line-height:1.6;
}

.btn{
  margin-top:25px;
  display:inline-block;
  padding:12px 22px;
  border-radius:10px;
  text-decoration:none;
  color:#fff;
  font-weight:700;
  background:linear-gradient(135deg,#0891b2,#7c3aed);
}

.btn:hover{
  opacity:.9;
}
</style>
</head>

<body>

<div class="card">

  <div class="logo">SkillSync AI</div>

  <div class="icon">📧</div>

  <h1>Check your email</h1>

  <p>
    We’ve sent you a password reset link.<br>
    Please check your inbox (and spam folder).
  </p>

  <p>
    Click the link in the email to set a new password.
  </p>
<p style="margin-top:15px;">Didn't receive the email?</p>

<button id="resendBtn" class="btn" disabled style="opacity:.5; cursor:not-allowed;">
  Resend Email in <span id="timer">30</span>s ⏱
</button>

  <a href="{% url 'login' %}" class="btn">Back to Login</a>

</div>


<script>
let timeLeft = 30;

const btn = document.getElementById("resendBtn");
const timerText = document.getElementById("timer");

const countdown = setInterval(() => {
    timeLeft--;
    timerText.textContent = timeLeft;

    if (timeLeft <= 0) {
        clearInterval(countdown);
        btn.disabled = false;
        btn.style.opacity = "1";
        btn.style.cursor = "pointer";
        btn.innerHTML = "Resend Email 🔄";

        // click event after enabled
        btn.addEventListener("click", () => {
            window.location.href = "{% url 'password_reset' %}";
        });
    }
}, 1000);
</script>


</body>
</html>
