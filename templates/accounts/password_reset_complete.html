<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Reset Successful</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#060610;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  background:#111122;
  padding:40px;
  border-radius:15px;
  text-align:center;
  width:350px;
}

h1{
  color:#4ade80;
  margin-bottom:10px;
}

p{
  color:#ccc;
  font-size:14px;
}

.btn{
  margin-top:20px;
  display:inline-block;
  padding:10px 20px;
  background:#7c3aed;
  color:#fff;
  text-decoration:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="card">
  <h1>✅ Password Reset Successful</h1>

  <p>Your password has been updated successfully.</p>
  <p>You can now login with your new password.</p>

  <a href="{% url 'login' %}" class="btn">Login Now</a>
</div>

</body>
</html>
