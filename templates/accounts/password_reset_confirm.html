{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set New Password — SkillSync AI</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800;900&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body{
  margin:0;
  font-family:'Plus Jakarta Sans',sans-serif;
  background:#060610;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  width:100%;
  max-width:420px;
  background:rgba(255,255,255,.05);
  padding:40px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 30px 80px rgba(0,0,0,.6);
}

h1{
  font-family:'Syne',sans-serif;
  font-size:1.5rem;
  margin-bottom:10px;
}

p{
  color:#aaa;
  font-size:.9rem;
  margin-bottom:20px;
}

/* Container for positioning the icon inside input */
.input-group {
  position: relative;
  width: 100%;
  margin-bottom: 15px;
}

.input{
  width: 100%;
  padding: 12px;
  box-sizing: border-box; /* Ensures padding doesn't break width */
  border-radius: 10px;
  border: 1px solid #333;
  background: #0f0f1a;
  color: #fff;
  font-family: inherit;
}

.input:focus{
  outline:none;
  border-color:#7c3aed;
}

/* Icon Styling */
.toggle-btn {
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #666;
  display: flex;
  align-items: center;
  transition: color 0.2s;
}

.toggle-btn:hover {
  color: #7c3aed;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#0891b2,#7c3aed);
  color:#fff;
  font-weight:700;
  cursor:pointer;
  margin-top: 10px;
}

.btn:hover{
  opacity:.9;
}

.error{
  color:#f87171;
  font-size:.8rem;
  margin-bottom:10px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="card">

  {% if validlink %}

    <h1>Set New Password 🔐</h1>
    <p>Enter your new password below</p>

    <form method="POST">
      {% csrf_token %}

      {% if form.errors %}
        <div class="error">
          {{ form.errors }}
        </div>
      {% endif %}

      <div class="input-group">
        <input type="password" name="new_password1" id="id_password1" placeholder="New Password" class="input" required>
        <span class="toggle-btn" onclick="togglePass('id_password1', this)">
          <i data-lucide="eye" class="eye-icon"></i>
          <i data-lucide="eye-off" class="eye-off-icon hidden"></i>
        </span>
      </div>

      <div class="input-group">
        <input type="password" name="new_password2" id="id_password2" placeholder="Confirm Password" class="input" required>
        <span class="toggle-btn" onclick="togglePass('id_password2', this)">
          <i data-lucide="eye" class="eye-icon"></i>
          <i data-lucide="eye-off" class="eye-off-icon hidden"></i>
        </span>
      </div>

      <button type="submit" class="btn">Reset Password</button>
    </form>

  {% else %}

    <h1>Invalid Link ❌</h1>
    <p>This password reset link is invalid or expired.</p>
    <a href="{% url 'password_reset' %}" style="text-decoration: none;">
        <button class="btn">Request New Link</button>
    </a>

  {% endif %}

</div>

<script>
  // Initialize Lucide icons
  lucide.createIcons();

  function togglePass(inputId, el) {
    const input = document.getElementById(inputId);
    const eye = el.querySelector('.eye-icon');
    const eyeOff = el.querySelector('.eye-off-icon');

    if (input.type === 'password') {
      input.type = 'text';
      eye.classList.add('hidden');
      eyeOff.classList.remove('hidden');
    } else {
      input.type = 'password';
      eye.classList.remove('hidden');
      eyeOff.classList.add('hidden');
    }
  }
</script>

</body>
</html>
