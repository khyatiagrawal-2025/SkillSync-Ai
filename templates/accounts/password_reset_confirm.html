{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set New Password — SkillSync AI</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800;900&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Plus Jakarta Sans',sans-serif;
  background:#060610;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  width:100%;
  max-width:420px;
  background:rgba(255,255,255,.05);
  padding:40px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 30px 80px rgba(0,0,0,.6);
}

h1{
  font-family:'Syne',sans-serif;
  font-size:1.5rem;
  margin-bottom:10px;
}

p{
  color:#aaa;
  font-size:.9rem;
  margin-bottom:20px;
}

.input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:10px;
  border:1px solid #333;
  background:#0f0f1a;
  color:#fff;
}

.input:focus{
  outline:none;
  border-color:#7c3aed;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#0891b2,#7c3aed);
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

.btn:hover{
  opacity:.9;
}

.error{
  color:#f87171;
  font-size:.8rem;
  margin-bottom:10px;
}

.success{
  color:#4ade80;
  font-size:.9rem;
}
</style>
</head>

<body>

<div class="card">

  {% if validlink %}

    <h1>Set New Password 🔐</h1>
    <p>Enter your new password below</p>

    <form method="POST">
      {% csrf_token %}

      {% if form.errors %}
        <div class="error">
          {{ form.errors }}
        </div>
      {% endif %}

      <input type="password" name="new_password1" placeholder="New Password" class="input" required>
      <input type="password" name="new_password2" placeholder="Confirm Password" class="input" required>

      <button type="submit" class="btn">Reset Password</button>
    </form>

  {% else %}

    <h1>Invalid Link ❌</h1>
    <p>This password reset link is invalid or expired.</p>

    <a href="{% url 'password_reset' %}" class="btn">Request New Link</a>

  {% endif %}

</div>

</body>
</html>
